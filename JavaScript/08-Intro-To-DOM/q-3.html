<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>

<body>
    <div>
        <span class="var1">5</span>
        <span class="operator">+</span>
        <span class="var2">10</span>
        <span>=</span>
        <span class="result"></span>
    </div>
</body>

<script>
    const v1 = parseInt(document.querySelector('.var1').innerText);
    const v2 = parseInt(document.querySelector('.var2').innerText);
    const operator = document.querySelector('.operator').innerText;
    const res = document.querySelector('.result');
    let ans = 0;

    switch (operator) {

        case "+":
            ans = v1 + v2;
            break;

        case "-":
            ans = v1 - v2;
            break;

        case "*":
            ans = v1 * v2;
            break;

        case "/":
            ans = v1 / v2;
            break;

        default:
            ans = undefined;
            break;
    }

    res.innerText = ans;
</script>

</html>
