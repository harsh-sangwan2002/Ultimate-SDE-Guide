<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book My Show</title>

    <style>
        .container {
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            align-items: center;
        }

        .movies {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

        .movie {
            /* height: 150px; */
            width: 200px;
            border: 1px solid black;
            text-align: center;
            color: white;
            position: relative;
        }

        .movie-title {
            background-color: black;
            padding: 0.3rem;
        }

        .movie-price {
            font-size: 2rem;
            background-color: chocolate;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .remove-icon {
            position: absolute;
            top: -20px;
            right: -15px;
            border-radius: 50%;
            background-color: red;
            color: white;
            font-size: 1rem;
            padding: 0.7rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 id="heading">BookMyShow</h1>
        <select id="genre">
            <option value="all">All</option>
            <option value="action">Action</option>
            <option value="comedy">Comedy</option>
            <option value="romance">Romance</option>
            <option value="horror">Horror</option>
        </select>
        <div class="movies">
            <div class="movie">
                <div class="movie-title">Action: Movie 1</div>
                <div class="movie-price">Rs 100</div>
                <i class="remove-icon">X</i>
            </div>
            <div class="movie">
                <div class="movie-title">Romance: Movie 2</div>
                <div class="movie-price">Rs 200</div>
                <i class="remove-icon">X</i>
            </div>
            <div class="movie">
                <div class="movie-title">Horror: Movie 3</div>
                <div class="movie-price">Rs 100</div>
                <i class="remove-icon">X</i>
            </div>
            <div class="movie">
                <div class="movie-title">Action: Movie 4</div>
                <div class="movie-price">Rs 250</div>
                <i class="remove-icon">X</i>
            </div>
            <div class="movie">
                <div class="movie-title">Action: Movie 5</div>
                <div class="movie-price">Rs 350</div>
                <i class="remove-icon">X</i>
            </div>
            <div class="movie">
                <div class="movie-title">Romance: Movie 6</div>
                <div class="movie-price">Rs 100</div>
                <i class="remove-icon">X</i>
            </div>
            <div class="movie">
                <div class="movie-title">Action: Movie 7</div>
                <div class="movie-price">Rs 300</div>
                <i class="remove-icon">X</i>
            </div>
            <div class="movie">
                <div class="movie-title">Horror: Movie 8</div>
                <div class="movie-price">Rs 150</div>
                <i class="remove-icon">X</i>
            </div>
            <div class="movie">
                <div class="movie-title">Comedy: Movie 9</div>
                <div class="movie-price">Rs 400</div>
                <i class="remove-icon">X</i>
            </div>
            <div class="movie">
                <div class="movie-title">Comedy: Movie 10</div>
                <div class="movie-price">Rs 100</div>
                <i class="remove-icon">X</i>
            </div>
        </div>
    </div>
</body>

<script>
    const selectRef = document.querySelector('select');
    const movies = document.querySelectorAll('.movie');

    selectRef.addEventListener('change', e => {
        const currGenre = e.target.value;

        movies.forEach(movie => {
            const movieGenre = movie.querySelector('.movie-title').innerText.toLowerCase();

            if (currGenre == "all" || movieGenre.includes(currGenre))
                movie.style.display = "block";

            else
                movie.style.display = "none";
        })
    })

    movies.forEach(movie => {
        movie.addEventListener('click', e => {

            if (e.target.classList.contains('remove-icon'))
                movie.style.display = "none";
        })
    })
</script>

</html>
