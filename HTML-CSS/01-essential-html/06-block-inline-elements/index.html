<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML & CSS Sandbox</title>
  <style>
    /* 
    1) Horizontal margins do not collapse. They are added together.
    2) For normal block elements, vertical margins collapse. 
    */
    p {
      background-color: #aaa;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    a {
      /* display: block; */
      background-color: #eee;
      padding: 0.5rem;
      margin-right: 0.5em;
    }
  </style>
</head>

<body>
  <h1>HTML & CSS Sandbox - Block vs Inline</h1>

  <!-- Block-level Elements -->
  <p id="p1">Lorem ipsum dolor sit.</p>
  <p id="p2">Lorem ipsum dolor sit.</p>

  <!-- Inline Elements -->
  <a href="#">Link 1</a>
  <a href="#">Link 2</a>
</body>

</html>
