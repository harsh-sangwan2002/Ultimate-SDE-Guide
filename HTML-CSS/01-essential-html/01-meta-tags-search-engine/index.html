<!DOCTYPE html>

<html>

<head>
    <title>HTML & CSS Sandbox - Meta Tags</title>
    <!-- 
    1) Meta tags are not visible on the webpage and present in the head tag
    2) Search engines can use these tags to understand the content of the web pahe
    3) Some tags can impact SEO -->

    <!-- Specifies the character encoding -->
    <meta charset="UTF-8" />

    <!-- Controls layout on different devices/screens -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Description is displayed in the search results -->
    <meta name="description" content="Learn HTML, CSS, and JS with our beginner friendly tutorials.">
    <meta name="keywords" content="HTML, CSS, JS, Web Development" />

    <meta name="author" content="John Doe" />
    <meta name="robots" content="index, follow" />
</head>

<body>
    <!-- This is a comment -->
    <h1>Hi</h1>
</body>

</html>
