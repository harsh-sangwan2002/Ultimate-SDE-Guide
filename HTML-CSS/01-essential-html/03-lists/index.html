<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>

<body>
    <h1>HTML & CSS Sandbox - Lists</h1>

    <!-- Unordered List -->
    <ul>
        <li>Item One</li>
        <li>Item Two</li>
        <li>Item Three</li>
    </ul>

    <!-- Ordered List -->
    <ol>
        <li>Item One</li>
        <li>Item Two</li>
        <li>Item Three</li>
    </ol>

    <!-- Nested List -->
    <ul>
        <li>Item One</li>
        <li>Item Two</li>
        <li>
            <ul>
                <li>Item Three</li>
                <li>Item Four</li>
            </ul>
        </li>
        <li>Item Five</li>
    </ul>

    <!-- Definition List -->
    <dl>
        <!-- Definition Term -->
        <dt>Item One</dt>
        <!-- Definition Description -->
        <dd>Description One</dd>

        <dt>Item Two</dt>
        <dd>Description Two</dd>
    </dl>
</body>

</html>
